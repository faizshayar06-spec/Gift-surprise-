<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: radial-gradient(circle, #2d0b16, #000); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 30px; border: 1px solid #ff3366; text-align: center; width: 300px; backdrop-filter: blur(15px); }
        .hidden { display: none; }
        input { background: rgba(255,255,255,0.1); border: 1px solid #ff3366; color: white; padding: 10px; width: 80%; border-radius: 10px; margin: 10px 0; }
        button { background: #ff3366; border: none; padding: 10px 20px; color: white; border-radius: 20px; cursor: pointer; }
        .gallery img { width: 250px; height: 250px; border-radius: 20px; object-fit: cover; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<!-- Step 1: Lock -->
<div class="card" id="lock1">
    <h1>Welcome Hayati ❤️</h1>
    <input type="text" id="dateInput" placeholder="Relationship Date (03/09/2025)">
    <button onclick="unlock('dateInput', 'MDMvMDkvMjAyNQ==', 'lock2')">Unlock</button>
</div>

<!-- Step 2: Time Lock -->
<div class="card hidden" id="lock2">
    <h1>Special Time?</h1>
    <input type="text" id="timeInput" placeholder="HH:MM">
    <button onclick="unlock('timeInput', 'MTI6MTI=', 'gallery')">Show Memories</button>
</div>

<!-- Step 3: Gallery -->
<div class="card hidden" id="gallery">
    <div class="gallery">
        <img src="https://ibb.co/gk0jwPT" id="p1" style="display:block;">
        <img src="https://ibb.co/hJ316dR1" id="p2">
        <img src="https://ibb.co/Jw1bN0HR" id="p3">
        <img src="https://ibb.co/KcD4qkZF" id="p4">
        <img src="https://ibb.co/F4sQzZNK" id="p5">
    </div>
    <button onclick="next()">Agli Yaad ❤️</button>
</div>

<script>
    function unlock(inputId, secret, nextId) {
        if (btoa(document.getElementById(inputId).value) === secret) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(nextId).classList.remove('hidden');
        } else { alert("Access Denied Hayati! ❤️"); }
    }

    let pCount = 1;
    function next() {
        document.getElementById('p'+pCount).style.display = 'none';
        pCount = (pCount >= 5) ? 1 : pCount + 1;
        document.getElementById('p'+pCount).style.display = 'block';
    }
</script>
</body>
</html>
