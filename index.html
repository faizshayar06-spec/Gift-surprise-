<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #2d0b16, #000); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 320px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .gallery img { width: 250px; height: 250px; border-radius: 30px; object-fit: cover; display: none; border: 4px solid #ff3366; }
        button { background: linear-gradient(45deg, #ff3366, #ff0055); border: none; padding: 12px 25px; color: white; border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        .heart { position: absolute; color: #ff3366; font-size: 20px; animation: rain linear infinite; pointer-events: none; }
        @keyframes rain { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

<div id="heart-container"></div>

<div class="card">
    <div class="gallery">
        <img src="https://i.ibb.co/mFk4D8v/photo1.jpg" id="p1" style="display:block;">
        <img src="https://i.ibb.co/L9p6z0t/photo2.jpg" id="p2">
        <img src="https://i.ibb.co/v3Z5x7q/photo3.jpg" id="p3">
        <img src="https://i.ibb.co/K2s8m9n/photo4.jpg" id="p4">
        <img src="https://i.ibb.co/p5b2v1x/photo5.jpg" id="p5">
    </div>
    <button onclick="next()">Agli Yaad ❤️</button>
</div>

<script>
    setInterval(() => {
        let h = document.createElement('div');
        h.innerHTML = "❤️";
        h.className = "heart";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = Math.random() * 3 + 2 + "s";
        document.getElementById('heart-container').appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }, 300);

    let pCount = 1;
    function next() {
        document.getElementById('p'+pCount).style.display = 'none';
        pCount = (pCount >= 5) ? 1 : pCount + 1;
        document.getElementById('p'+pCount).style.display = 'block';
    }
</script>
</body>
</html>
